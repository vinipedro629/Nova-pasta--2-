<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards | Meu Caderno de Estudos</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <header>

            <h1>🃏 Flashcards</h1>

            <p>Estude virando os cartões e teste sua memória.</p>

        </header>

        <div class="flashcard">

            <div class="lado frente">

                <h2>Pergunta</h2>

                <p id="perguntaFlashcard">
                    Aqui aparecerá a pergunta cadastrada.
                </p>

            </div>

            <div class="lado verso">

                <h2>Resposta</h2>

                <p id="respostaFlashcard">
                    Aqui aparecerá a resposta da pergunta.
                </p>

            </div>

        </div>

        <div class="botoes">

            <button id="btnVirar">
                🔄 Virar Cartão
            </button>

            <button id="btnAnterior">
                ⬅ Anterior
            </button>

            <button id="btnProximo">
                ➡ Próximo
            </button>

            <button onclick="window.location.href='index.html'">
                🏠 Início
            </button>

        </div>

    </div>

    <script src="js/flashcards.js"></script>

</body>

</html>
